# Fallback if Railpack falls through to Nixpacks
[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
# Must go through a shell so Railway's PORT expands (literal $PORT crashes uvicorn).
cmd = "sh -c 'exec uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}'"
