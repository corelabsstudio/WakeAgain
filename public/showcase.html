<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body class="form-body">
  <header class="nav-pill-wrap form-nav">
    <div class="nav-pill">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Wake<span class="brand-again">Again</span></span>
      </a>
      <nav class="nav-links" data-i18n-aria="common.nav_menu" aria-label="메뉴">
        <a href="/app/#list" data-i18n="nav.market">마켓플레이스</a>
        <a href="/showcase.html" aria-current="page" data-i18n="nav.showcase">자랑하기</a>
        <a href="/guide/" data-i18n="nav.guide">이용안내</a>
      </nav>
      <div class="nav-actions">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang-switch="ko">KO</button>
          <button type="button" class="lang-btn" data-lang-switch="en">EN</button>
        </div>
        <a class="btn btn-primary btn-sm" href="/diagnose.html" data-i18n="diag.cta">무료진단</a>
      </div>
    </div>
  </header>

  <main class="form-page showcase-page">
    <div class="showcase-head">
      <div>
        <h1 data-i18n="showcase.title">프로젝트 자랑</h1>
      </div>
      <a class="btn btn-primary btn-lg" href="/diagnose.html" data-i18n="showcase.cta">무료진단 후 자랑하기</a>
    </div>

    <section data-i18n-aria="sc.section" aria-label="최근 자랑">
      <div class="showcase-grid" id="scGrid" aria-live="polite">
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w80"></div><div class="skeleton skeleton-line w60"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w80"></div><div class="skeleton skeleton-line w40"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w60"></div><div class="skeleton skeleton-line w80"></div></div>
      </div>
    </section>
  </main>

  <footer class="site-footer compact-footer">
        <div class="corelabs-brand-row">
      <img class="corelabs-mark" src="/assets/corelabs-logo-mark-light.png" alt="CoreLabs" width="22" height="22" loading="lazy" decoding="async" />
      <span class="muted fine">운영 · 코어랩스(CoreLabs)</span>
    </div>
<p class="footer-broker-notice">
      <span data-i18n="footer.broker">본 플랫폼은 통신판매중개자이며, 거래되는 상품의 품질과 내용은 판매자가 책임집니다.</span>
      <span class="footer-broker-sub" data-i18n="sc.footer_sub">쇼케이스는 판매 매물이 아닙니다. WakeAgain(코어랩스)은 품질·사기를 보증하지 않습니다.</span>
    </p>
    <p class="footer-copy">© 2026 CoreLabs · WakeAgain ·
      <a href="/legal/terms.html" data-i18n="footer.terms">이용약관</a> ·
      <a href="/diagnose.html" data-i18n="diag.cta">무료진단</a>
    </p>
  </footer>

  <script src="/js/ui-sound.js?v=20260722a"></script>
  <script src="/js/i18n-messages.js?v=20260720c"></script>
  <script src="/js/i18n.js?v=20260720c"></script>
  <script src="/js/api.js"></script>
  <script>
    (function () {
      var api = window.WakeAgainAPI;
      var grid = document.getElementById("scGrid");
      var lastList = null;

      function tt(key, vars) {
        return window.WakeAgainI18n && window.WakeAgainI18n.t
          ? window.WakeAgainI18n.t(key, vars)
          : key;
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function won(n) {
        if (n == null || n === "") return null;
        if (window.WakeAgainI18n && window.WakeAgainI18n.formatMoney) {
          return window.WakeAgainI18n.formatMoney(n);
        }
        return "₩" + Number(n).toLocaleString("ko-KR");
      }

      function cardHtml(s) {
        var en = window.WakeAgainI18n && window.WakeAgainI18n.getLang && window.WakeAgainI18n.getLang() === "en";
        var price = won(s.price_hint);
        var st = (en && s.status_label_en) || s.status_label || "";
        var pt = (en && s.product_type_label_en) || s.product_type_label || "";
        var one = (en && s.one_liner_en) || s.one_liner || "";
        var story = (en && s.story_en) || s.story || "";
        var tags = "";
        if (st) tags += "<span>" + esc(st) + "</span>";
        if (pt) tags += "<span>" + esc(pt) + "</span>";
        if (price) tags += "<span>" + esc(tt("sc.price_tag", { p: price })) + "</span>";
        if (s.diag_score != null) tags += "<span>" + esc(tt("sc.score_tag", { n: s.diag_score })) + "</span>";
        var demo = (s.demo || "").trim();
        var demoBit = demo
          ? '<p class="sc-one" style="margin-top:0.25rem">' +
            esc(tt("sc.demo_prefix")) +
            esc(demo.slice(0, 120)) +
            (demo.length > 120 ? "…" : "") +
            "</p>"
          : "";
        return (
          '<article class="sc-card" data-id="' + s.id + '">' +
          "<h3>" + esc(s.title) + "</h3>" +
          '<p class="sc-one">' + esc(one) + "</p>" +
          (String(story).trim()
            ? '<p class="sc-story">' + esc(story) + "</p>"
            : "") +
          demoBit +
          '<div class="sc-meta">' + tags + "</div>" +
          '<div class="sc-foot">' +
          '<span class="sc-author">' + esc(s.author_name || tt("sc.anonymous")) + "</span>" +
          '<button type="button" class="sc-cheer" data-cheer="' + s.id + '">' +
          esc(tt("sc.cheer", { n: s.cheer_count || 0 })) +
          "</button>" +
          "</div></article>"
        );
      }

      function renderList(list) {
        lastList = list;
        if (!list || !list.length) {
          grid.innerHTML = '<div class="empty-state sc-empty">' + tt("sc.empty_html") + "</div>";
          return;
        }
        grid.innerHTML = list.map(cardHtml).join("");
      }

      async function loadFeed() {
        try {
          var data = await api.request("/api/v1/showcases?limit=30");
          var list = (data && data.showcases) || [];
          renderList(list);
        } catch (e) {
          grid.innerHTML = '<p class="sc-empty">' + esc(tt("sc.load_fail")) + "</p>";
        }
      }

      grid.addEventListener("click", async function (e) {
        var btn = e.target.closest("[data-cheer]");
        if (!btn) return;
        var id = btn.getAttribute("data-cheer");
        btn.disabled = true;
        try {
          var data = await api.request("/api/v1/showcases/" + encodeURIComponent(id) + "/cheer", {
            method: "POST",
          });
          if (data && data.showcase) {
            btn.textContent = tt("sc.cheer", { n: data.showcase.cheer_count || 0 });
          }
        } catch (ex) {
          /* ignore */
        }
        btn.disabled = false;
      });

      document.addEventListener("wa:langchange", function () {
        if (lastList) renderList(lastList);
      });

      if (!api || !api.request) {
        api = {
          request: async function (path, opts) {
            opts = opts || {};
            var res = await fetch(path, {
              method: opts.method || "GET",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: opts.body || undefined,
            });
            var data = await res.json().catch(function () { return {}; });
            if (!res.ok) throw new Error(data.detail || data.message || res.statusText);
            return data;
          },
        };
      }
      loadFeed();
    })();
  </script>
</body>
</html>
