<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>프로젝트 자랑 보드 — WakeAgain</title>
  <meta name="description" content="잠든 프로젝트 자랑 보드. 판매 매물이 아닙니다. 데모·스토리를 공유하고 마켓에 올려 보세요." />
  <meta name="theme-color" content="#050508" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <!-- feed-only: form lives at /showcase-new.html -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/ux9.css" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body class="form-body">
  <header class="nav-pill-wrap form-nav">
    <div class="nav-pill">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Wake<span class="brand-again">Again</span></span>
      </a>
      <nav class="nav-links" aria-label="메뉴">
        <a href="/app/#list" data-i18n="nav.market">마켓플레이스</a>
        <a href="/showcase.html" aria-current="page" data-i18n="nav.showcase">자랑하기</a>
        <a href="/guide/" data-i18n="nav.guide">이용안내</a>
      </nav>
      <div class="nav-actions">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang-switch="ko">KO</button>
          <button type="button" class="lang-btn" data-lang-switch="en">EN</button>
        </div>
        <a class="btn btn-primary btn-sm" href="/diagnose.html" data-i18n="diag.cta">무료진단</a>
      </div>
    </div>
  </header>

  <main class="form-page showcase-page">
    <div class="showcase-head">
      <div>
        <h1 data-i18n="showcase.title">프로젝트 자랑</h1>
      </div>
      <a class="btn btn-primary btn-lg" href="/diagnose.html" data-i18n="showcase.cta">무료진단 후 자랑하기</a>
    </div>

    <section aria-label="최근 자랑">
      <div class="showcase-grid" id="scGrid" aria-live="polite">
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w80"></div><div class="skeleton skeleton-line w60"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w80"></div><div class="skeleton skeleton-line w40"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line w60"></div><div class="skeleton skeleton-line w80"></div></div>
      </div>
    </section>
  </main>

  <footer class="site-footer compact-footer">
    <p class="footer-broker-notice">
      본 플랫폼은 <strong>통신판매중개자</strong>이며, 거래되는 상품의 품질과 내용은 <strong>판매자</strong>가 책임집니다.
      <span class="footer-broker-sub">쇼케이스는 판매 매물이 아닙니다. WakeAgain(코어랩스)은 품질·사기를 보증하지 않습니다.</span>
    </p>
    <p class="footer-copy">© 2026 CoreLabs · WakeAgain ·
      <a href="/legal/terms.html">이용약관</a> ·
      <a href="/diagnose.html">무료진단</a>
    </p>
  </footer>

  <script src="/js/i18n-messages.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script>
    (function () {
      var api = window.WakeAgainAPI;
      var grid = document.getElementById("scGrid");

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function won(n) {
        if (n == null || n === "") return null;
        if (window.WakeAgainI18n && window.WakeAgainI18n.formatMoney) {
          return window.WakeAgainI18n.formatMoney(n);
        }
        return "₩" + Number(n).toLocaleString("ko-KR");
      }

      function cardHtml(s) {
        var price = won(s.price_hint);
        var tags = "";
        if (s.status_label) tags += "<span>" + esc(s.status_label) + "</span>";
        if (s.product_type_label) tags += "<span>" + esc(s.product_type_label) + "</span>";
        if (price) tags += "<span>시작가 힌트 " + price + "</span>";
        if (s.diag_score != null) tags += "<span>진단 " + esc(s.diag_score) + "점</span>";
        var demo = (s.demo || "").trim();
        var demoBit = demo
          ? '<p class="sc-one" style="margin-top:0.25rem">데모: ' + esc(demo.slice(0, 120)) + (demo.length > 120 ? "…" : "") + "</p>"
          : "";
        return (
          '<article class="sc-card" data-id="' + s.id + '">' +
          "<h3>" + esc(s.title) + "</h3>" +
          '<p class="sc-one">' + esc(s.one_liner) + "</p>" +
          ((s.story || "").trim()
            ? '<p class="sc-story">' + esc(s.story) + "</p>"
            : "") +
          demoBit +
          '<div class="sc-meta">' + tags + "</div>" +
          '<div class="sc-foot">' +
          '<span class="sc-author">' + esc(s.author_name || "익명") + "</span>" +
          '<button type="button" class="sc-cheer" data-cheer="' + s.id + '">응원 ' +
          (s.cheer_count || 0) + "</button>" +
          "</div></article>"
        );
      }

      async function loadFeed() {
        try {
          var data = await api.request("/api/v1/showcases?limit=30");
          var list = (data && data.showcases) || [];
          if (!list.length) {
            grid.innerHTML =
              '<div class="empty-state sc-empty">아직 자랑이 없어요.<br />' +
              '<a class="btn btn-primary" href="/diagnose.html">무료진단</a></div>';
            return;
          }
          grid.innerHTML = list.map(cardHtml).join("");
        } catch (e) {
          grid.innerHTML = '<p class="sc-empty">불러오지 못했어요.</p>';
        }
      }

      grid.addEventListener("click", async function (e) {
        var btn = e.target.closest("[data-cheer]");
        if (!btn) return;
        var id = btn.getAttribute("data-cheer");
        btn.disabled = true;
        try {
          var data = await api.request("/api/v1/showcases/" + encodeURIComponent(id) + "/cheer", {
            method: "POST",
          });
          if (data && data.showcase) {
            btn.textContent = "응원 " + (data.showcase.cheer_count || 0);
          }
        } catch (ex) {
          /* ignore */
        }
        btn.disabled = false;
      });

      if (!api || !api.request) {
        api = {
          request: async function (path, opts) {
            opts = opts || {};
            var res = await fetch(path, {
              method: opts.method || "GET",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: opts.body || undefined,
            });
            var data = await res.json().catch(function () { return {}; });
            if (!res.ok) throw new Error(data.detail || data.message || res.statusText);
            return data;
          },
        };
      }
      loadFeed();
    })();
  </script>
</body>
</html>
